type: grid
cards:
  - type: heading
    icon: mdi:cast-audio
    heading: Sala
    heading_style: title
  - type: tile
    entity: switch.s60tpf_7_rpi_sala
    name: Controlador
    icon: mdi:speaker-bluetooth
    vertical: false
    tap_action:
      action: call-service
      service: switch.turn_on
      target:
        entity_id: switch.s60tpf_7_rpi_sala
    icon_tap_action:
      action: none
    features_position: bottom
    visibility:
      - condition: state
        entity: switch.s60tpf_7_rpi_sala
        state: "off"
  - type: tile
    entity: switch.s60tpf_7_rpi_sala
    name: Controlador
    icon: mdi:speaker-bluetooth
    vertical: false
    tap_action:
      action: call-service
      service: switch.turn_off
      target:
        entity_id: switch.s60tpf_7_rpi_sala
      confirmation:
        text: "Confirmar: desligar o controlador?"
    icon_tap_action:
      action: none
    features_position: bottom
    visibility:
      - condition: state
        entity: switch.s60tpf_7_rpi_sala
        state: "on"
  - type: custom:bubble-card
    card_type: media-player
    entity: media_player.colunas_sala
    name: Sala
    icon: mdi:cast-audio
    cover_background: true
    button_action:
      tap_action:
        action: more-info
    sub_button:
      main:
        - entity: switch.s60tpf_7_rpi_sala
          icon: mdi:raspberry-pi
          show_icon: true
          show_state: false
          tap_action:
            action: toggle
        - entity: binary_sensor.bt_sala
          icon: mdi:bluetooth-off
          show_icon: true
          show_state: false
          tap_action:
            action: call-service
            service: script.bt_pair_sala
          visibility:
            - condition: state
              entity: binary_sensor.bt_sala
              state: "off"
            - condition: state
              entity: script.bt_pair_sala
              state: "off"
        - entity: script.bt_pair_sala
          icon: mdi:bluetooth-connect
          show_icon: true
          show_state: false
          tap_action:
            action: none
          visibility:
            - condition: state
              entity: script.bt_pair_sala
              state: "on"
        - entity: binary_sensor.bt_sala
          icon: mdi:bluetooth
          show_icon: true
          show_state: false
          tap_action:
            action: call-service
            service: script.bt_unpair_sala
            confirmation:
              text: "Confirmar: esquecer o amplificador Bluetooth?"
          visibility:
            - condition: state
              entity: binary_sensor.bt_sala
              state: "on"
            - condition: state
              entity: script.bt_pair_sala
              state: "off"
            - condition: state
              entity: script.bt_unpair_sala
              state: "off"
        - entity: script.bt_unpair_sala
          icon: mdi:bluetooth-off
          show_icon: true
          show_state: false
          tap_action:
            action: none
          visibility:
            - condition: state
              entity: script.bt_unpair_sala
              state: "on"
    visibility:
      - condition: state
        entity: switch.s60tpf_7_rpi_sala
        state: "on"
