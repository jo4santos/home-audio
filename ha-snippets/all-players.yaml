type: grid
columns: 2
cards:
  - type: custom:bubble-card
    card_type: media-player
    entity: media_player.colunas_escritorio
    name: Escritório
    icon: mdi:cast-audio
    cover_background: true
    button_action:
      tap_action:
        action: more-info
    sub_button:
      main:
        - entity: switch.s60tpf_4_rpi_escritorio
          icon: mdi:raspberry-pi
          show_icon: true
          show_state: false
          tap_action:
            action: toggle
        - entity: binary_sensor.bt_escritorio
          icon: mdi:bluetooth-off
          show_icon: true
          show_state: false
          tap_action:
            action: call-service
            service: script.bt_pair_escritorio
          visibility:
            - condition: state
              entity: binary_sensor.bt_escritorio
              state: "off"
            - condition: state
              entity: script.bt_pair_escritorio
              state: "off"
        - entity: script.bt_pair_escritorio
          icon: mdi:bluetooth-connect
          show_icon: true
          show_state: false
          tap_action:
            action: none
          visibility:
            - condition: state
              entity: script.bt_pair_escritorio
              state: "on"
        - entity: binary_sensor.bt_escritorio
          icon: mdi:bluetooth
          show_icon: true
          show_state: false
          tap_action:
            action: call-service
            service: script.bt_unpair_escritorio
            confirmation:
              text: "Confirmar: esquecer o amplificador Bluetooth?"
          visibility:
            - condition: state
              entity: binary_sensor.bt_escritorio
              state: "on"
            - condition: state
              entity: script.bt_pair_escritorio
              state: "off"
            - condition: state
              entity: script.bt_unpair_escritorio
              state: "off"
        - entity: script.bt_unpair_escritorio
          icon: mdi:bluetooth-off
          show_icon: true
          show_state: false
          tap_action:
            action: none
          visibility:
            - condition: state
              entity: script.bt_unpair_escritorio
              state: "on"
